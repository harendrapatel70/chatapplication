<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatApp | Connect Instantly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }

    .hero {
      min-height: 90vh;
      background: linear-gradient(135deg, #9b465a, #b55e4f);
      color: white;
      display: flex;
      align-items: center;
    }

    .hero h1 span {
      color: #ffecec;
    }

    .btn-custom {
      background-color: white;
      color: #ff4b2b;
      font-weight: 600;
      border-radius: 30px;
      padding: 12px 30px;
    }

    .btn-custom:hover {
      background-color: #ffecec;
      color: #ff2b2b;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-danger" href="#">ChatApplication</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'login' %}">Login</a>
        </li>
        <li class="nav-item ms-lg-2">
          <a class="btn btn-danger rounded-pill px-4" href="{% url 'register' %}">
            Register
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <div class="container text-center">
    <h1 class="display-4 fw-bold mb-3">
      Connect. Chat. <span>Instantly.</span>
    </h1>
    <p class="lead mb-4">
      A fast, secure, and modern chat application built for real conversations.
    </p>
    <a href="{% url 'register' %}" class="btn btn-custom btn-lg">
      Get Started Free
    </a>
  </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
